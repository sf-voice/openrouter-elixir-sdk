name: openrouter snapshot check

on:
  pull_request:
    paths:
      - "priv/openrouter/**"
      - "lib/mix/tasks/openrouter.snapshot.ex"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - run: mix deps.get
      - name: assert snapshot matches upstream
        run: mix openrouter.snapshot --check
